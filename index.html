<style>
:root{
  --ink:#2b2621;--ink-soft:#6f6a63;
  --green:#2E7D54;--green-deep:#2E5D44;--green-soft:#E7F3ED;
  --paper:#fffaf2;--page:#e6efe8;--line:#efe6d8;--focus:#2b6fff;
  --ease:cubic-bezier(.23,1,.32,1)
}
*{box-sizing:border-box}
html{background:var(--page)}
body{margin:0;min-height:100dvh;background:radial-gradient(125% 90% at 50% 0,#eef4ee 0,#e2ebe4 100%);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
button{font:inherit;color:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
  transition:transform .13s var(--ease),box-shadow .13s var(--ease),background .15s ease,border-color .15s ease,color .15s ease}
button:focus-visible{outline:4px solid var(--focus);outline-offset:3px}
.phone-shell{width:min(100%,720px);min-height:100dvh;margin:auto;background:var(--paper);box-shadow:0 0 60px rgba(31,86,64,.16);padding-bottom:174px}
.simple-header{height:72px;padding:0 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}
.logo{font-size:26px;font-weight:950;letter-spacing:-1.6px;color:var(--green)}
.adult-button{border:2px solid #e4ddcd;background:#fff;border-radius:999px;padding:10px 15px;font-size:12.5px;font-weight:800;color:var(--ink-soft);box-shadow:0 3px 0 #ece4d2}
.adult-button:active{transform:translateY(3px);box-shadow:0 0 0 #ece4d2}
.adult-guide{margin:14px 16px 0;padding:17px;border-radius:20px;background:var(--green-soft);border:1px solid #cbe3d6;line-height:1.6}
.adult-guide strong{font-size:16px}
.adult-guide p{margin:8px 0;font-size:13px}
.adult-guide p b{color:var(--green)}
.adult-guide small{color:#68766f}
.voice-bar{min-height:96px;margin:16px;display:flex;align-items:center;gap:13px;border:3px dashed #c3cfc7;border-radius:26px;padding:13px 16px;background:#fff}
.voice-bar.has-message{border:4px solid var(--green);background:#f5fdf8}
.voice-bar.has-message strong{font-size:22px;color:var(--green-deep)}
.voice-bar>.pictogram{width:64px;height:64px;flex:0 0 64px;border-radius:18px}
.tap-hand{font-size:42px;width:56px;text-align:center}
.voice-bar div{min-width:0;display:flex;flex-direction:column;gap:4px}
.voice-bar small{font-size:12px;color:var(--ink-soft);font-weight:700}
.voice-bar strong{font-size:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.voice-bar button{margin-left:auto;flex:0 0 64px;height:64px;border:0;border-radius:19px;background:var(--green);color:#fff;font-size:20px;font-weight:900;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 4px 0 var(--green-deep)}
.voice-bar button span{font-size:10px;margin-top:3px}
.voice-bar button:active{transform:translateY(4px);box-shadow:0 0 0 var(--green-deep)}
.communication-board{padding:10px 16px 24px}
.section-title{display:flex;align-items:center;gap:11px;margin:4px 2px 16px}
.section-title>span{width:46px;height:46px;border-radius:16px;display:grid;place-items:center;background:var(--green-soft);font-size:25px}
.section-title h1{margin:0;font-size:24px;letter-spacing:-.9px;font-weight:900}
.section-title p{margin:3px 0 0;color:var(--ink-soft);font-size:12.5px;font-weight:700}
.picture-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:13px}
.picture-card{--sh:#e6dcca;border:2px solid rgba(20,10,0,.06);border-radius:26px;min-height:214px;padding:10px 10px 15px;background:#fff;display:flex;flex-direction:column;align-items:center;position:relative;box-shadow:0 6px 0 var(--sh);transition:transform .13s var(--ease),box-shadow .13s var(--ease),filter .15s ease}
.picture-card:active{transform:translateY(4px);box-shadow:0 2px 0 var(--sh);border-color:var(--green)}
.pictogram{display:block;width:100%;aspect-ratio:1/1;background-image:url('aac-pictograms-v2.png');background-size:400% 400%;background-position:var(--x) var(--y);background-repeat:no-repeat;border-radius:18px}
.pictogram.single-image{background-size:cover;background-position:center}
.action-image{background-image:url('aac-essential-actions-v4.png');background-size:300% 200%;background-position:var(--x) var(--y)}
.picture-card strong{font-size:21px;font-weight:800;letter-spacing:-.6px;margin-top:9px;color:var(--ink)}
.audio-mark{margin-top:6px;border-radius:999px;background:rgba(255,255,255,.72);padding:5px 10px;font-size:10px;color:#53645c;font-weight:900;letter-spacing:.2px}
.picture-card.peach{--sh:#f0c9ab;background:#ffe6d1}
.picture-card.yellow{--sh:#efd88c;background:#ffedb4}
.picture-card.mint{--sh:#b7ddc9;background:#d7f0e1}
.picture-card.rose{--sh:#f2c2bd;background:#ffdfdb}
.picture-card.blue{--sh:#b8d6e8;background:#d9ebf6}

@keyframes card-pop{0%{transform:scale(.92)}65%{transform:scale(1.08)}100%{transform:scale(1.055)}}

.record-row button,.saved-row button{border:0;border-radius:12px;padding:10px 13px;font-size:12px;font-weight:900;background:var(--green);color:#fff;box-shadow:0 3px 0 var(--green-deep)}
.record-row button:active,.saved-row button:active{transform:translateY(3px);box-shadow:0 0 0 var(--green-deep)}
.record-row button:disabled{background:#c1cac6;box-shadow:0 3px 0 #aab3af}

.saved-row button:last-child{background:#8a8078;box-shadow:0 3px 0 #6c635c}
.adult-guide>small{display:block;color:#24634f;font-weight:800}
@keyframes record-pulse{50%{opacity:.55}}
.essential-bar{position:fixed;z-index:6;bottom:88px;left:50%;transform:translateX(-50%);width:min(100%,720px);height:72px;display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:7px 12px;background:#fff8ee;border-top:1px solid #eddccb;box-shadow:0 -6px 18px rgba(68,42,21,.09)}
.essential-bar button{--sh:#e0cdbf;border:2px solid rgba(120,70,40,.14);border-radius:18px;display:flex;align-items:center;justify-content:center;gap:9px;font-size:18px;font-weight:950;box-shadow:0 4px 0 var(--sh)}
.essential-bar button:active{transform:translateY(4px);box-shadow:0 1px 0 var(--sh)}
.essential-bar .pictogram{width:49px;height:49px;flex:0 0 49px;border-radius:12px}
.essential-bar .stop{--sh:#f0b3aa;background:#ffe1da;color:#9f291d}
.essential-bar .pain{--sh:#f0cf8f;background:#fff0cf;color:#8e451e}
.essential-bar button.selected{border:5px solid var(--green);transform:scale(1.04)}
.bottom-nav{position:fixed;z-index:5;bottom:0;left:50%;transform:translateX(-50%);width:min(100%,720px);height:88px;padding:8px 8px max(8px,env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(4,1fr);gap:4px;background:#fff;border-top:1px solid var(--line);box-shadow:0 -8px 24px rgba(52,71,62,.08)}
.bottom-nav button{border:0;background:transparent;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--ink-soft)}
.bottom-nav button span{font-size:23px}
.bottom-nav button b{font-size:11px;letter-spacing:-.4px}
.bottom-nav button:active{transform:scale(.92)}
.bottom-nav button.active{background:var(--green-soft);color:var(--green-deep)}
.bottom-nav button.active span{transform:scale(1.08)}
@media(hover:hover){
  .adult-button:hover{border-color:#cec5b2;color:var(--ink)}
  .picture-card:hover{filter:brightness(1.03)}
  .voice-bar button:hover,.record-row button:hover,.saved-row button:hover{filter:brightness(1.06)}
  .bottom-nav button:not(.active):hover{color:var(--green)}
}
@media(min-width:600px){.picture-grid{max-width:540px;margin:0 auto}.picture-card{min-height:230px}.communication-board{padding-inline:20px}.voice-bar{margin-inline:20px}}
@media(max-width:370px){.picture-card{min-height:185px}.picture-card strong{font-size:18px}.bottom-nav button b{font-size:10px}.essential-bar button{font-size:16px}.essential-bar .pictogram{width:43px;height:43px;flex-basis:43px}}
/* 문장 만들기 */
.sentence-bar{margin:16px;padding:12px;border:3px solid #c3cfc7;border-radius:24px;background:#fff;display:flex;flex-direction:column;gap:10px}
.sentence-bar.has-words{border-color:var(--green);background:#f7fffb}
.chip-row{min-height:74px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.chip-hint{color:var(--ink-soft);font-size:13px;font-weight:700;padding:0 4px}
.word-chip{display:flex;align-items:center;gap:7px;background:var(--green-soft);border:2px solid #bcdcca;border-radius:14px;padding:6px 10px 6px 6px}
.word-chip .pictogram{width:38px;height:38px;flex:0 0 38px;border-radius:9px}
.word-chip .fn-icon{width:38px;height:38px;display:grid;place-items:center;font-size:22px;background:#fff;border-radius:9px}
.word-chip b{font-size:16px;letter-spacing:-.4px;color:var(--green-deep)}
.chip-plus{color:#9aa8a1;font-weight:900;font-size:15px}
.func-row{display:flex;gap:7px;flex-wrap:wrap;border-top:1px dashed #dde5e0;padding-top:9px}
.func-chip{display:flex;align-items:center;gap:5px;border:2px solid #e0d4bd;background:#fffaf0;border-radius:999px;padding:8px 13px;font-size:14px;font-weight:800;box-shadow:0 3px 0 #ece0cc}
.func-chip:active{transform:translateY(3px);box-shadow:0 0 0 #ece0cc}
.sentence-actions{display:flex;gap:8px}
.sentence-actions button{border:0;border-radius:14px;padding:12px;font-size:15px;font-weight:900;background:#eef2ef;color:var(--ink);box-shadow:0 3px 0 #d9e0db;min-width:52px}
.sentence-actions .speak-btn{flex:1;background:var(--green);color:#fff;box-shadow:0 4px 0 var(--green-deep);font-size:17px}
.sentence-actions button:active{transform:translateY(3px);box-shadow:none}
.sentence-actions button:disabled{opacity:.45;box-shadow:none}
@media(prefers-reduced-motion:reduce){*{transition:none!important}.picture-card.selected,.record-row button.recording{animation:none}}
</style>
</head>
<body>
<div id="app"></div>
<script>
"use strict";

/* ---------- 데이터 ---------- */
// word = 문장 만들기에서 쓰는 낱말 단위 (voice-word/<id>.mp3 와 짝)
const categories = [
  { id:"daily", label:"꼭 필요한 말", icon:"💬", prompt:"지금 필요한 말을 골라요", cards:[
    { id:"no", label:"싫어요", short:"싫어요", word:"싫어요", action:0, color:"rose" },
    { id:"help", label:"도와주세요", short:"도와주세요", word:"도와주세요", action:2, color:"mint" },
    { id:"toilet", label:"화장실 가고 싶어요", short:"화장실", word:"화장실", action:3, color:"blue" },
    { id:"more", label:"더 주세요", short:"더 주세요", word:"더", image:0, color:"peach" },
  ]},
  { id:"food", label:"먹고 싶어요", icon:"🥄", prompt:"먹거나 마시고 싶은 것을 골라요", cards:[
    { id:"water", label:"물 주세요", short:"물", word:"물", image:6, color:"blue" },
    { id:"milk", label:"우유 주세요", short:"우유", word:"우유", image:7, color:"blue" },
    { id:"gummy", label:"젤리 주세요", short:"젤리", word:"젤리", src:"aac-gummy-bears-v3.png", color:"yellow" },
    { id:"rice", label:"밥 주세요", short:"밥", word:"밥", src:"aac-rice-bowl-v3.png", color:"rose" },
  ]},
  { id:"play", label:"하고 싶어요", icon:"🧸", prompt:"지금 하고 싶은 것을 골라요", cards:[
    { id:"bear", label:"곰 인형 주세요", short:"곰 인형", word:"곰 인형", image:10, color:"yellow" },
    { id:"book", label:"책 주세요", short:"책", word:"책", image:11, color:"blue" },
    { id:"outside", label:"나가고 싶어요", short:"나가기", word:"나가고 싶어요", src:"aac-playground.png", color:"mint" },
    { id:"rest", label:"쉬고 싶어요", short:"쉬기", word:"쉬고 싶어요", image:13, color:"peach" },
  ]},
  { id:"feeling", label:"내 마음", icon:"❤️", prompt:"지금 내 마음을 골라요", cards:[
    { id:"yes", label:"좋아요", short:"좋아요", word:"좋아요", image:4, color:"mint" },
    { id:"wait", label:"기다려 주세요", short:"기다려요", word:"기다려 주세요", image:5, color:"yellow" },
    { id:"happy", label:"기뻐요", short:"기뻐요", word:"기뻐요", image:14, color:"yellow" },
    { id:"sad", label:"슬퍼요", short:"슬퍼요", word:"슬퍼요", image:15, color:"blue" },
  ]},
];

const fixedCards = [
  { id:"stop", label:"그만해요", short:"그만해요", word:"그만해요", action:1, color:"stop" },
  { id:"pain", label:"아파요", short:"아파요", word:"아파요", action:4, color:"pain" },
];

// 연결말: 낱말을 문장으로 이어주는 칩 (문장 모드에서만 보임)
const funcWords = [
  { id:"fn-please", word:"주세요", icon:"🙏" },
  { id:"fn-go", word:"가고 싶어요", icon:"🚶" },
  { id:"fn-do", word:"하고 싶어요", icon:"✋" },
];

/* ---------- 녹음 음성 저장 (IndexedDB, 이 기기 전용) ---------- */
function openVoiceDB(){
  return new Promise((resolve,reject)=>{
    const request = indexedDB.open("maeumtalk-voices",1);
    request.onupgradeneeded = ()=> request.result.createObjectStore("voices");
    request.onsuccess = ()=> resolve(request.result);
    request.onerror = ()=> reject(request.error);
  });
}
async function saveVoice(id,blob){
  const db = await openVoiceDB();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction("voices","readwrite");
    tx.objectStore("voices").put(blob,id);
    tx.oncomplete = ()=> resolve();
    tx.onerror = ()=> reject(tx.error);
  });
}
async function getVoice(id){
  const db = await openVoiceDB();
  return new Promise((resolve,reject)=>{
    const r = db.transaction("voices").objectStore("voices").get(id);
    r.onsuccess = ()=> resolve(r.result);
    r.onerror = ()=> reject(r.error);
  });
}
async function deleteVoice(id){
  const db = await openVoiceDB();
  return new Promise((resolve)=>{
    const tx = db.transaction("voices","readwrite");
    tx.objectStore("voices").delete(id);
    tx.oncomplete = ()=> resolve();
  });
}
async function countVoices(){
  try {
    const db = await openVoiceDB();
    return await new Promise((resolve)=>{
      const r = db.transaction("voices").objectStore("voices").count();
      r.onsuccess = ()=> resolve(r.result); r.onerror = ()=> resolve(0);
    });
  } catch { return 0; }
}
async function clearAllVoices(){
  const db = await openVoiceDB();
  return new Promise((resolve)=>{
    const tx = db.transaction("voices","readwrite");
    tx.objectStore("voices").clear();
    tx.oncomplete = ()=> resolve();
  });
}

/* ---------- 음성 재생 ---------- */
// 남성·자연스러운 한국어 음성 선택. 기기에 남성 음성이 있으면 우선 사용,
// 없으면 기본(여성) 음성의 톤을 낮춰 남성적으로 들리게 합니다.
const MALE_KO = [/injoon/i, /hyunsu/i, /\breed\b/i, /\beddy\b/i, /grandpa/i, /rocko/i, /minsu/i, /남성/, /남자/];
let koVoice = null;
function pickKoreanVoice(){
  if(!("speechSynthesis" in window)) return;
  const ko = speechSynthesis.getVoices().filter(v => /^ko/i.test(v.lang));
  if(!ko.length) return;
  for(const rx of MALE_KO){
    const hit = ko.find(v => rx.test(v.name));
    if(hit){ koVoice = hit; return; }
  }
  koVoice = ko.find(v => v.default) || ko[0]; // 남성 음성 없음 → 기본 음성 + 낮은 톤
}
function isMaleVoice(v){ return !!v && MALE_KO.some(rx => rx.test(v.name)); }
if("speechSynthesis" in window){
  pickKoreanVoice();
  speechSynthesis.onvoiceschanged = pickKoreanVoice; // 음성 목록 지연 로딩 대응
}

// 시스템 TTS는 마지막 대비용(내장 음성이 없을 때만). 톤 왜곡 없이 자연스럽게.
function systemSpeak(text){
  if(!("speechSynthesis" in window)) return;
  if(!koVoice) pickKoreanVoice();
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "ko-KR";
  if(koVoice) u.voice = koVoice;
  u.rate = 0.92;
  u.pitch = 1.0;
  window.speechSynthesis.speak(u);
}

// 앱에 내장된 자연스러운 사람 목소리(voice/<id>.mp3) 재생
let currentAudio = null;
function playBundled(card){
  return new Promise((resolve,reject)=>{
    if(currentAudio){ try{ currentAudio.pause(); }catch{} }
    const audio = new Audio(`voice/${card.id}.mp3`);
    currentAudio = audio;
    audio.addEventListener("error", ()=> reject(new Error("no-bundle")), { once:true });
    audio.play().then(resolve, reject);
  });
}
async function playCard(card){
  // 1) 보호자가 직접 녹음한 목소리 (있으면 최우선)
  try {
    const blob = await getVoice(card.id);
    if(blob){
      if(currentAudio){ try{ currentAudio.pause(); }catch{} }
      const audio = new Audio(URL.createObjectURL(blob));
      currentAudio = audio;
      audio.onended = ()=> URL.revokeObjectURL(audio.src);
      await audio.play();
      return;
    }
  } catch {}
  // 2) 앱 내장 자연 음성
  try { await playBundled(card); return; } catch {}
  // 3) 시스템 음성(내장 음성이 없는 카드 대비)
  systemSpeak(card.label);
}

/* ---------- 픽토그램 ---------- */
function pictogramHTML(card){
  if(card.src){
    return `<span class="pictogram single-image" style="background-image:url('${card.src}')" aria-hidden="true"></span>`;
  }
  if(card.action !== undefined){
    const x = (card.action % 3) * 50;
    const y = Math.floor(card.action / 3) * 100;
    return `<span class="pictogram action-image" style="--x:${x}%;--y:${y}%" aria-hidden="true"></span>`;
  }
  const index = card.image ?? 0;
  const x = (index % 4) * 33.3333;
  const y = Math.floor(index / 4) * 33.3333;
  return `<span class="pictogram" style="--x:${x}%;--y:${y}%" aria-hidden="true"></span>`;
}

/* ---------- 상태 ---------- */
const state = { activeId:"daily", selected:null, guide:false, recording:false, hasRecording:false, notice:"",
                sentenceMode:false, sentence:[], speaking:false, recordedCount:0 };
let recorder = null;
let chunks = [];

function activeCategory(){ return categories.find(c=>c.id===state.activeId); }
function findCard(id){
  for(const c of categories){ const f = c.cards.find(k=>k.id===id); if(f) return f; }
  return fixedCards.find(k=>k.id===id) || null;
}
function setState(patch){ Object.assign(state, patch); render(); }

/* ---------- 문장 만들기 ---------- */
// 낱말 음성(voice-word/<id>.mp3) 한 개 재생 — 끝날 때까지 기다림
function playWordAudio(id){
  return new Promise((resolve)=>{
    if(currentAudio){ try{ currentAudio.pause(); }catch{} }
    const audio = new Audio(`voice-word/${id}.mp3`);
    currentAudio = audio;
    audio.onended = ()=> resolve();
    audio.onerror = ()=> resolve();
    audio.play().catch(()=> resolve());
  });
}
function addWord(item){
  if(navigator.vibrate) navigator.vibrate(35);
  setState({ sentence: state.sentence.concat([item]) });
  playWordAudio(item.id);
}
async function speakSentence(){
  if(state.speaking || !state.sentence.length) return;
  setState({ speaking:true });
  for(const item of state.sentence){
    await playWordAudio(item.id);
    await new Promise(r=> setTimeout(r, 90)); // 낱말 사이 짧은 쉼
  }
  setState({ speaking:false });
}

/* ---------- 동작 ---------- */
function choose(card){
  if(state.sentenceMode){
    addWord({ id:card.id, word:card.word, card:card });
    return;
  }
  setState({ selected:card, hasRecording:false });
  if(navigator.vibrate) navigator.vibrate(45);
  getVoice(card.id).then(v=>{
    if(state.selected && state.selected.id === card.id) setState({ hasRecording:Boolean(v) });
  }).catch(()=>{});
  playCard(card);
}
async function startRecording(){
  if(!state.selected) return;
  const target = state.selected;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    const rec = new MediaRecorder(stream);
    chunks = [];
    rec.ondataavailable = e=> chunks.push(e.data);
    rec.onstop = async ()=>{
      const blob = new Blob(chunks, {type:rec.mimeType});
      await saveVoice(target.id, blob);
      stream.getTracks().forEach(t=>t.stop());
      const stillSame = state.selected && state.selected.id === target.id;
      setState({ recording:false, hasRecording: stillSame ? true : state.hasRecording, notice:`“${target.label}” 녹음을 저장했어요.` });
    };
    recorder = rec;
    rec.start();
    setState({ recording:true, notice:"아이에게 들려줄 말을 천천히 말해 주세요." });
    window.setTimeout(()=>{ if(rec.state==="recording") rec.stop(); }, 5000);
  } catch {
    setState({ notice:"마이크 사용을 허용해 주세요." });
  }
}
function stopRecording(){ if(recorder && recorder.state==="recording") recorder.stop(); }
async function removeRecording(){
  if(!state.selected) return;
  await deleteVoice(state.selected.id);
  setState({ hasRecording:false, notice:"녹음을 지웠어요. 기본 음성을 사용합니다." });
}

/* ---------- 렌더 ---------- */
function render(){
  const active = activeCategory();
  const sel = state.selected;

  const guideHTML = state.guide ? `
    <section class="adult-guide">
      <div class="record-row">
        <span>문장 만들기 ${state.sentenceMode?"<b>켜짐</b>":"꺼짐"}</span>
        <button data-role="toggle-sentence">${state.sentenceMode?"끄기":"켜기"}</button>
      </div>
      <p>켜면 그림을 눌러 낱말을 이어 문장을 만들어요. (예: 물 + 더 + 주세요)</p>
      <strong>보호자 목소리 녹음</strong>
      <p>먼저 아이 화면에서 그림을 하나 선택한 뒤 녹음하세요. 이 기기에만 안전하게 저장됩니다.</p>
      <div class="record-row">
        <span>${sel ? `선택: ${sel.label}` : "먼저 그림을 선택해 주세요"}</span>
        <button data-role="record-toggle" ${sel?"":"disabled"} class="${state.recording?"recording":""}">${state.recording?"■ 저장":"● 녹음"}</button>
      </div>
      ${sel && state.hasRecording ? `<div class="saved-row"><button data-role="play-recording">▶ 녹음 듣기</button><button data-role="remove-recording">녹음 지우기</button></div>` : ""}
      ${state.recordedCount > 0 ? `<div class="record-row"><span>저장된 녹음 ${state.recordedCount}개 — 이게 있으면 기본 음성 대신 재생돼요</span><button data-role="clear-all-recordings">전체 지우기</button></div>` : ""}
      ${state.notice ? `<small>${state.notice}</small>` : ""}
    </section>` : "";

  const chipsHTML = state.sentence.length
    ? state.sentence.map((it,i)=>`<span class="word-chip">${it.card?pictogramHTML(it.card):`<span class="fn-icon">${it.icon||"💬"}</span>`}<b>${it.word}</b></span>`).join(`<span class="chip-plus">+</span>`)
    : `<span class="chip-hint">그림을 눌러 낱말을 이어 보세요</span>`;

  const funcHTML = funcWords.map(f=>`
    <button class="func-chip" data-role="add-func" data-id="${f.id}"><span>${f.icon}</span>${f.word}</button>`).join("");

  const sentenceBarHTML = `
    <section class="sentence-bar ${state.sentence.length?"has-words":""}">
      <div class="chip-row" aria-live="polite">${chipsHTML}</div>
      <div class="func-row">${funcHTML}</div>
      <div class="sentence-actions">
        <button class="speak-btn" data-role="speak-sentence" ${state.sentence.length?"":"disabled"}>${state.speaking?"말하는 중…":"▶ 말하기"}</button>
        <button data-role="undo-word" ${state.sentence.length?"":"disabled"} aria-label="마지막 낱말 지우기">←</button>
        <button data-role="clear-sentence" ${state.sentence.length?"":"disabled"} aria-label="문장 전체 지우기">✕</button>
      </div>
    </section>`;

  const voiceBarHTML = sel
    ? `${pictogramHTML(sel)}<div><small>내가 말했어요</small><strong>${sel.label}</strong></div><button data-role="replay" aria-label="선택한 말 다시 듣기">▶<span>다시 듣기</span></button>`
    : `<span class="tap-hand">☝️</span><div><small>그림을 누르면</small><strong>소리로 말해줘요</strong></div>`;

  const cardsHTML = active.cards.map(card=>`
    <button class="picture-card ${card.color} ${sel && sel.id===card.id?"selected":""}" data-role="choose" data-id="${card.id}" aria-label="${card.label}. 누르면 말해요">
      ${pictogramHTML(card)}<strong>${card.short}</strong><span class="audio-mark">소리 ▶</span>
    </button>`).join("");

  const essentialHTML = fixedCards.map(card=>`
    <button class="${card.color} ${sel && sel.id===card.id?"selected":""}" data-role="choose" data-id="${card.id}">
      ${pictogramHTML(card)}<strong>${card.short}</strong>
    </button>`).join("");

  const navHTML = categories.map(cat=>`
    <button class="${state.activeId===cat.id?"active":""}" data-role="nav" data-id="${cat.id}">
      <span>${cat.icon}</span><b>${cat.label.replace(" 싶어요","")}</b>
    </button>`).join("");

  document.getElementById("app").innerHTML = `
    <main class="phone-shell">
      <header class="simple-header">
        <div class="logo">마음톡</div>
        <button class="adult-button" data-role="toggle-guide" aria-expanded="${state.guide}">보호자 설정 ${state.guide?"×":"⚙"}</button>
      </header>
      ${guideHTML}
      ${state.sentenceMode ? sentenceBarHTML : `<section class="voice-bar ${sel?"has-message":""}" aria-live="polite">${voiceBarHTML}</section>`}
      <section class="communication-board">
        <div class="section-title"><span>${active.icon}</span><div><h1>${active.label}</h1><p>${active.prompt}</p></div></div>
        <div class="picture-grid">${cardsHTML}</div>
      </section>
      <aside class="essential-bar" aria-label="항상 사용하는 말">${essentialHTML}</aside>
      <nav class="bottom-nav" aria-label="말하기 주제">${navHTML}</nav>
    </main>`;
}

/* ---------- 이벤트 (위임) ---------- */
document.getElementById("app").addEventListener("click", (e)=>{
  const el = e.target.closest("[data-role]");
  if(!el) return;
  const role = el.getAttribute("data-role");
  const id = el.getAttribute("data-id");
  if(role==="toggle-guide"){ const opening=!state.guide; setState({ guide:opening }); if(opening){ countVoices().then(n=> setState({ recordedCount:n })); } }
  else if(role==="clear-all-recordings"){ clearAllVoices().then(()=> setState({ recordedCount:0, hasRecording:false, notice:"저장된 녹음을 모두 지웠어요. 이제 기본 음성으로 들려요." })); }
  else if(role==="choose"){ const card = findCard(id); if(card) choose(card); }
  else if(role==="replay"){ if(state.selected) playCard(state.selected); }
  else if(role==="record-toggle"){ state.recording ? stopRecording() : startRecording(); }
  else if(role==="play-recording"){ if(state.selected) playCard(state.selected); }
  else if(role==="remove-recording"){ removeRecording(); }
  else if(role==="nav"){ setState({ activeId:id, selected:null }); }
  else if(role==="toggle-sentence"){ setState({ sentenceMode:!state.sentenceMode, sentence:[], selected:null }); }
  else if(role==="add-func"){ const f = funcWords.find(x=>x.id===id); if(f) addWord({ id:f.id, word:f.word, icon:f.icon }); }
  else if(role==="speak-sentence"){ speakSentence(); }
  else if(role==="undo-word"){ setState({ sentence: state.sentence.slice(0,-1) }); }
  else if(role==="clear-sentence"){ setState({ sentence: [] }); }
});

render();

/* ---------- PWA ---------- */
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=> navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
</script>
</body>
</html>
